<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎉 You Found It</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Instrument Sans', sans-serif;
    }

    .disco-wrap {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }

    .disco-ball {
      position: absolute;
      border-radius: 50%;
      animation: discoFloat linear infinite;
    }

    .beam {
      position: absolute;
      width: 2px;
      border-radius: 1px;
      transform-origin: top center;
      animation: beamSweep linear infinite;
    }

    @keyframes discoFloat {
      0%   { transform: translateY(0px) rotate(0deg); }
      50%  { transform: translateY(-20px) rotate(180deg); }
      100% { transform: translateY(0px) rotate(360deg); }
    }

    @keyframes beamSweep {
      0%   { transform: rotate(0deg);   opacity: 0.8; }
      50%  { transform: rotate(180deg); opacity: 0.2; }
      100% { transform: rotate(360deg); opacity: 0.8; }
    }

    .confetti-piece {
      position: fixed;
      top: -20px;
      animation: confettiFall linear infinite;
      z-index: 1;
      border-radius: 2px;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 24px;
      max-width: 620px;
    }

    .badge {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2rem, 6vw, 3.8rem);
      line-height: 1.15;
      margin-bottom: 14px;
      background: linear-gradient(135deg, #ffe600 0%, #ff6ac1 40%, #00e5ff 80%, #ffe600 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    .sub {
      color: #9999bb;
      font-size: 1rem;
      margin-bottom: 36px;
      line-height: 1.75;
    }

    .img-wrap {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      margin: 0 auto 32px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: glowPulse 3s ease-in-out infinite;
      border: 3px solid transparent;
      background: linear-gradient(#0a0a1a, #0a0a1a) padding-box,
                  linear-gradient(135deg, #ffe600, #ff6ac1, #00e5ff, #ffe600) border-box;
      background-size: 300% 300%;
    }

    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 40px #ffe60066, 0 0 80px #ff6ac133; }
      33%     { box-shadow: 0 0 40px #ff6ac166, 0 0 80px #00e5ff33; }
      66%     { box-shadow: 0 0 40px #00e5ff66, 0 0 80px #ffe60033; }
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .img-placeholder {
      color: #444466;
      font-size: 0.78rem;
      line-height: 1.7;
      padding: 20px;
    }

    .back-btn {
      display: inline-block;
      margin-top: 4px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid #333355;
      color: #888899;
      border-radius: 100px;
      font-size: 0.8rem;
      text-decoration: none;
      transition: all 0.2s;
    }

    .back-btn:hover {
      border-color: #ffe600;
      color: #ffe600;
      background: #ffe60011;
    }
  </style>
</head>
<body>

<div class="disco-wrap" id="disco-wrap"></div>
<div id="confetti-container"></div>

<div class="content">
  <div class="badge">🎉 You Found the Secret Page!</div>
  <p class="sub">
    Congratulations — you discovered the hidden easter egg.<br>
    Not many people make it here.
  </p>

  <div class="img-wrap">
    <!--
      TO ADD YOUR PHOTO:
      1. Put your image file in your tp53-website folder
      2. Replace the div below with:
         <img src="yourphoto.jpg" alt="me">
    -->
    <img src="mrg.jpeg" alt="mrg">
  </div>

  <a href="references.html" class="back-btn">← back to safety</a>
</div>

<script>
// ── CONFETTI ──
const COLORS = ['#ffe600','#ff6ac1','#00e5ff','#7bff7b','#ff9500','#ffffff','#c084fc','#f87171'];
const confettiContainer = document.getElementById('confetti-container');

for (let i = 0; i < 90; i++) {
  const p = document.createElement('div');
  p.className = 'confetti-piece';
  p.style.left             = Math.random() * 100 + 'vw';
  p.style.width            = (Math.random() * 9 + 5) + 'px';
  p.style.height           = (Math.random() * 9 + 5) + 'px';
  p.style.background       = COLORS[Math.floor(Math.random() * COLORS.length)];
  p.style.borderRadius     = Math.random() > 0.5 ? '50%' : '2px';
  p.style.animationDuration = (Math.random() * 4 + 3) + 's';
  p.style.animationDelay   = (Math.random() * 6) + 's';
  confettiContainer.appendChild(p);
}

// ── DISCO BALLS ──
const wrap = document.getElementById('disco-wrap');
const balls = [
  { x:12, y:6,  size:70, hue:50  },
  { x:78, y:4,  size:90, hue:290 },
  { x:48, y:10, size:55, hue:185 },
  { x:90, y:22, size:48, hue:130 },
  { x:4,  y:20, size:42, hue:20  },
];

balls.forEach((b, bi) => {
  const ball = document.createElement('div');
  ball.className = 'disco-ball';
  ball.style.cssText = `
    left:${b.x}vw; top:${b.y}vh;
    width:${b.size}px; height:${b.size}px;
    background: radial-gradient(circle at 32% 32%,
      hsl(${b.hue},100%,92%),
      hsl(${b.hue},85%,50%),
      hsl(${b.hue+60},60%,18%));
    box-shadow: 0 0 ${b.size*.5}px hsl(${b.hue},100%,65%),
                0 0 ${b.size}px hsl(${b.hue},80%,45%)66;
    animation-duration:${3 + bi * 0.8}s;
    animation-delay:${bi * 0.35}s;
  `;
  wrap.appendChild(ball);

  // Radiating beams
  for (let r = 0; r < 10; r++) {
    const beam = document.createElement('div');
    beam.className = 'beam';
    beam.style.cssText = `
      left:${b.x + 2.5}vw; top:${b.y + 5}vh;
      height:${Math.random()*28+18}vh;
      background: linear-gradient(to bottom, hsl(${b.hue + r*25},100%,75%), transparent);
      transform: rotate(${r * 36}deg);
      animation-duration:${2.5 + Math.random()*2.5}s;
      animation-delay:${r * 0.25 + bi * 0.15}s;
    `;
    wrap.appendChild(beam);
  }
});
</script>

</body>
</html>
